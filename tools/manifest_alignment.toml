#
# Allow-list for `tools/check_manifest_alignment.py`. Each entry
# documents an intentional drift on a non-HW package that the check
# tolerates. CUDA / wheel-index-tied packages are auto-skipped by name
# pattern in the script and do NOT need an entry here.

# `diffusers` versions are pinned to the per-platform wheel index
# (main uses PyPI 0.35.1; Jetson sbsa/cu130 uses 0.36.0.dev0). The dev
# pins only resolve against the Jetson AI Lab index.
[allowed_drifts.diffusers]
reason = "HW-forced via jetson-sbsa-cu130 wheel index vs PyPI on dGPU main"

# `dm-tree` is loose (`dm-tree`) on main but pinned exactly
# (`==0.1.8`) on Jetson manifests because the Jetson AI Lab
# indices serve a single curated wheel. Low-priority drift; documented
# until owner decides whether to pin main.
[allowed_drifts.dm-tree]
reason = "loose on main, exact ==0.1.8 on Jetson — pending owner alignment"
